services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-richstudio}
      POSTGRES_USER: ${POSTGRES_USER:-richstudio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-db-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-richstudio} -d ${POSTGRES_DB:-richstudio}"]
      interval: 5s
      timeout: 5s
      retries: 30

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  api:
    build: ./apps/api
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-richstudio}
      POSTGRES_USER: ${POSTGRES_USER:-richstudio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-db-password}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - media_data:/app/media
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 12

  worker:
    build: ./apps/api
    restart: unless-stopped
    command: ["celery", "-A", "app.celery_app.celery", "worker", "--loglevel=INFO", "--concurrency=2"]
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-richstudio}
      POSTGRES_USER: ${POSTGRES_USER:-richstudio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-db-password}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - media_data:/app/media
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build: ./apps/web
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  media_data:
