services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-richstudio}
      POSTGRES_USER: ${POSTGRES_USER:-richstudio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-db-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-richstudio} -d ${POSTGRES_DB:-richstudio}"]
      interval: 5s
      timeout: 5s
      retries: 30

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  api:
    build: ./apps/api
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-richstudio}
      POSTGRES_USER: ${POSTGRES_USER:-richstudio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-db-password}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - media_data:/app/media
    ports:
      # Loopback only: nginx reaches the API over the compose network, so publishing
      # this port to the world only offered a way around nginx - its security headers,
      # its rate limits and any TLS terminator placed in front of it. /docs and
      # /openapi.json are not proxied by nginx, so this also takes them off the internet
      # while keeping `curl 127.0.0.1:8000/health` working on the server itself.
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 12

  worker:
    build: ./apps/api
    restart: unless-stopped
    command: ["celery", "-A", "app.celery_app.celery", "worker", "-B", "--loglevel=INFO", "--concurrency=2"]
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-richstudio}
      POSTGRES_USER: ${POSTGRES_USER:-richstudio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-db-password}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - media_data:/app/media
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build: ./apps/web
    restart: unless-stopped
    ports:
      # The LAN entry point. With the tls profile active, the public entry point is
      # Caddy on 80/443; this port stays for the local network and for a fallback.
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy

  # TLS: started only with `docker compose --profile tls up -d`, so a deployment
  # without a domain keeps working over the LAN port untouched.
  # Шлях Б: вихід назовні без білого IP і без відкритих портів.
  # cloudflared сам підключається НАЗОВНІ до Cloudflare; публічний hostname і
  # маршрут (studio.домен -> http://web:80) задаються в Zero Trust UI.
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles: ["tunnel"]
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - web

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    profiles: ["tls"]
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_started

  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER:-richstudio}
      PGPASSWORD: ${POSTGRES_PASSWORD:-change-this-db-password}
      PGDATABASE: ${POSTGRES_DB:-richstudio}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-14}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    volumes:
      # A bind mount, not a named volume: ./backups sits on the ZFS pool where
      # TrueNAS snapshot/replication/Cloud Sync tasks can actually reach it. A
      # backup on the same disk as the database only survives mistakes, not disks.
      - ./backups:/backups
      - media_data:/media:ro
    entrypoint: ["/bin/sh", "-c"]
    # Daily at container-local 03:00-ish (first run at startup):
    #   1. pg_dump, then pg_restore --list as an integrity check - a dump that
    #      cannot list its own contents is deleted and alerted, not stored;
    #   2. tar of the media volume - artifacts reference these files, a DB-only
    #      restore would resurrect pages full of dead image links;
    #   3. prune both kinds past BACKUP_KEEP_DAYS;
    #   4. failures go to Telegram when the token is configured (busybox wget).
    command:
      - |
        alert() {
          echo "BACKUP ALERT: $$1"
          if [ -n "$$TELEGRAM_BOT_TOKEN" ] && [ -n "$$TELEGRAM_CHAT_ID" ]; then
            wget -qO- --post-data="chat_id=$$TELEGRAM_CHAT_ID&text=Rich Studio backup: $$1" \
              "https://api.telegram.org/bot$$TELEGRAM_BOT_TOKEN/sendMessage" >/dev/null 2>&1 || true
          fi
        }
        while true; do
          STAMP=$$(date +%F-%H%M)
          DUMP="/backups/richstudio-$$STAMP.dump"
          if pg_dump -Fc -f "$$DUMP" && pg_restore --list "$$DUMP" >/dev/null 2>&1; then
            echo "db backup ok: $$STAMP ($$(du -h "$$DUMP" | cut -f1))"
          else
            rm -f "$$DUMP"
            alert "pg_dump або перевірка дампа впали ($$STAMP)"
          fi
          if tar -czf "/backups/media-$$STAMP.tar.gz" -C /media . 2>/dev/null; then
            echo "media backup ok: $$STAMP"
          else
            alert "архівація медіа впала ($$STAMP)"
          fi
          find /backups -name 'richstudio-*.dump' -mtime +$$BACKUP_KEEP_DAYS -delete
          find /backups -name 'media-*.tar.gz' -mtime +$$BACKUP_KEEP_DAYS -delete
          sleep 86400
        done
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  media_data:
  caddy_data:
  caddy_config:
