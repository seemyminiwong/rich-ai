services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-richstudio}
      POSTGRES_USER: ${POSTGRES_USER:-richstudio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-db-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-richstudio} -d ${POSTGRES_DB:-richstudio}"]
      interval: 5s
      timeout: 5s
      retries: 30

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  api:
    build: ./apps/api
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-richstudio}
      POSTGRES_USER: ${POSTGRES_USER:-richstudio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-db-password}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - media_data:/app/media
    ports:
      # Loopback only: nginx reaches the API over the compose network, so publishing
      # this port to the world only offered a way around nginx - its security headers,
      # its rate limits and any TLS terminator placed in front of it. /docs and
      # /openapi.json are not proxied by nginx, so this also takes them off the internet
      # while keeping `curl 127.0.0.1:8000/health` working on the server itself.
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 12

  worker:
    build: ./apps/api
    restart: unless-stopped
    command: ["celery", "-A", "app.celery_app.celery", "worker", "-B", "--loglevel=INFO", "--concurrency=2"]
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-richstudio}
      POSTGRES_USER: ${POSTGRES_USER:-richstudio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-db-password}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - media_data:/app/media
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build: ./apps/web
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy

  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER:-richstudio}
      PGPASSWORD: ${POSTGRES_PASSWORD:-change-this-db-password}
      PGDATABASE: ${POSTGRES_DB:-richstudio}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-14}
    volumes:
      - backup_data:/backups
    entrypoint: ["/bin/sh", "-c"]
    # Daily dump at container-local 03:00 plus one right at startup; old dumps
    # beyond BACKUP_KEEP_DAYS are pruned. Restore: see docs/DEPLOY.md section 5.
    command:
      - |
        while true; do
          STAMP=$$(date +%F-%H%M)
          pg_dump -Fc -f "/backups/richstudio-$$STAMP.dump" && echo "backup done: $$STAMP"
          find /backups -name 'richstudio-*.dump' -mtime +$$BACKUP_KEEP_DAYS -delete
          sleep 86400
        done
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  media_data:
  backup_data:
