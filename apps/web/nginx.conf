server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  client_max_body_size 20m;

  # nginx only inherits add_header into a location that declares none of its own,
  # so any location below that sets Cache-Control must repeat these three.
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "same-origin" always;

  location /api/ {
    proxy_pass http://api:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 2400s;
  }

  location /media/ {
    proxy_pass http://api:8000;
    proxy_read_timeout 300s;
    # Product images are embedded into sandboxed previews and, eventually, public
    # product pages: explicitly allow any embedding context to load them.
    # add_header here breaks inheritance, so the security trio is repeated.
    add_header Cross-Origin-Resource-Policy "cross-origin" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "same-origin" always;
  }

  location = /health {
    proxy_pass http://api:8000/health;
  }

  # Cache busting hangs off index.html staying fresh: the ?b= query on app.js only
  # reaches the browser if it re-reads the shell. With no Cache-Control at all,
  # browsers apply heuristic caching to it and keep serving yesterday's bundle.
  location = /index.html {
    add_header Cache-Control "no-store, must-revalidate" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "same-origin" always;
    try_files $uri =404;
  }

  location ~* \.(js|css)$ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "same-origin" always;
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
